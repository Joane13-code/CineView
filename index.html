  <!-- ===== HEADER PRINCIPAL (logo + ação de login + idioma) ===== -->

      <h1>CineView</h1>
      <p>Plataforma de Catálogo Digital</p>

  <!-- ===== HERO PRINCIPAL (chamada de valor) ===== -->
  <section class="hero">
    <h2>Interface Moderna para<br>Exibição de Conteúdos Digitais</h2>

  <!-- ===== BARRA DE PESQUISA ===== -->
  <section class="search-section" aria-label="Seção de pesquisa">
    <p class="search-title">Encontre seu filme favorito</p>
    <div class="search-box">
      <input id="searchInput" type="search" placeholder="Pesquisar filmes..." aria-label="Buscar filmes" />
    </div>
  </section>

  <section class="categories-section" aria-label="Categorias de filmes">
    <h2>Categorias</h2>

      <li><button type="button" class="category-btn">Romance</button></li>

      <li><button type="button" class="category-btn">Animação</button></li>
      <li><button type="button" class="category-btn">Suspense</button></li>
    </ul>
  </section>

    <h2>Catálogo de Filmes</h2>
    <section class="gallery" id="galeria" role="region" aria-label="Galeria de filmes"></section>

    function carregarGaleria(filmesExibidos = filmes) {
      const galeria = document.getElementById('galeria');
      galeria.innerHTML = '';

      if (filmesExibidos.length > 0 && filmesExibidos.length <= 2) {
        galeria.classList.add('compact');
      } else {
        galeria.classList.remove('compact');
      }

      if (filmesExibidos.length === 0) {
        const mensagem = document.createElement('p');
        mensagem.classList.add('no-results');
        mensagem.textContent = 'Nenhum filme encontrado para essa pesquisa.';
        galeria.appendChild(mensagem);
        return;
      }

      filmesExibidos.forEach((filme) => {
        const card = document.createElement('div');
        card.classList.add('card-filme');
        card.onclick = () => abrirDetalhes(filme);

        card.innerHTML = `
          <img src="${filme.img}" alt="Poster do filme ${filme.titulo}" />
          <h3>${filme.titulo}</h3>
        `;

        galeria.appendChild(card);
      });
    }

    function abrirDetalhes(filme) {
  document.getElementById('main').style.display = 'none';
  document.getElementById('detalhes').style.display = 'block';

  // montar elenco dinamicamente
  let elencoHTML = "";

  if (filme.elenco) {
    filme.elenco.forEach(ator => {
      elencoHTML += `
        <div class="ator">
          <img src="${ator.foto}">
          <p>${ator.nome}</p>
        </div>
      `;
    });
  }

  document.getElementById('conteudoDetalhes').innerHTML = `
    
    <h1>${filme.titulo}</h1>

    <div class="top-container">

      <div class="poster-box">
        <img src="${filme.img}" class="poster">
      </div>

  <p><strong>📅 Lançamento:</strong> ${filme.data || "N/A"}</p>

  <p><strong>⏱ Duração:</strong> ${filme.duracao || "N/A"}</p>

  <p><strong>🏢 Produtoras:</strong> ${filme.produtoras ? filme.produtoras.join(", ") : "N/A"}</p>

  <p><strong>🏆 Prêmios:</strong> ${filme.premios || "Nenhum informado"}</p>

</div>

        <div class="sinopse-box">
          <h2>Sinopse</h2>
          <p>${filme.Sinopse}</p>
        </div>

        <div class="info-extra">

          <div class="classificacao">
            Classificação: <strong>${filme.classificacao || "N/A"}</strong>
          </div>

          <div class="botoes-acao">
            <button>⬇️ Baixar</button>
            <button>▶️ Assistir</button>
          </div>
        </div>

      </div>

    </div>

    <div class="trailer">
      <h2>Trailer</h2>
      <iframe src="${filme.trailer}" allowfullscreen></iframe>
    </div>

    <div class="critica">
      <h2>Crítica</h2>

        ${elencoHTML || "Sem elenco disponível."}

  `;
}

    function atualizarIdioma(idioma) {
      const texts = textMap[idioma] || textMap.pt;
      document.querySelector('header h1').textContent = texts.title;
      document.querySelector('header p').textContent = texts.subtitle;
      document.querySelector('.btn-login').textContent = texts.login;
      document.querySelector('.hero h2').innerHTML = `${texts.heroLine1}<br>${texts.heroLine2}`;
      document.querySelector('.search-title').textContent = texts.searchTitle;
      document.querySelector('#searchInput').placeholder = texts.searchPlaceholder;
      document.querySelector('.categories-section h2').textContent = texts.categories;
      document.querySelector('main h2').textContent = texts.catalog;
      document.querySelector('.btn-back').textContent = texts.back;
    }

    languageSelector.addEventListener('change', (event) => {
      atualizarIdioma(event.target.value);
    });

    const inputPesquisa = document.getElementById('searchInput');
    inputPesquisa.addEventListener('input', (event) => {
      const termo = event.target.value.trim().toLowerCase();

      if (!termo) {
        carregarGaleria();
        return;
      }

      const resultados = filmes.filter((filme) => {
        const titulo = String(filme.titulo || '').toLowerCase();
        const sinopse = String(filme.Sinopse || '').toLowerCase();
        const generos = (filme.generos || []).join(' ').toLowerCase();
        const diretor = String(filme.direcao || '').toLowerCase();

        return (
          titulo.includes(termo) ||
          sinopse.includes(termo) ||
          generos.includes(termo) ||
          diretor.includes(termo)
        );
      });

      carregarGaleria(resultados);
    });

    atualizarIdioma('pt');
    carregarGaleria();
  </script>

</body>
</html>
